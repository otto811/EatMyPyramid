<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet & Macro Dashboard</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --primary: #3b82f6;
            --danger: #ef4444;
            --purple: #8b5cf6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
        }
        .full-width { grid-column: 1 / -1; }
       
        .profile-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            background-color: #e0e7ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            align-items: center;
        }
        h2, h3 { margin-top: 0; color: var(--text-main); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.9em; font-weight: 600; margin-bottom: 5px; }
        input[type="text"], select, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1em;
        }
        .search-row { display: flex; gap: 10px; }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        .preview-box {
            background-color: #f9fafb;
            padding: 15px;
            border-radius: 6px;
            font-size: 0.9em;
            border: 1px dashed #d1d5db;
            min-height: 120px;
        }
        .amount-row {
            display: flex;
            gap: 10px;
        }
        .amount-row input { flex: 2; padding: 14px; font-size: 1.1em; }
        .amount-row select { flex: 1; padding: 14px; }
        .reset-btn {
            background-color: var(--danger);
            color: white;
            width: 100%;
            margin-top: 15px;
            padding: 14px;
            font-size: 1.05em;
        }
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card full-width">
        <h2>Your Profile & Setup</h2>
        <div class="profile-bar">
            <div><label>Day of Week</label><select id="daySelect" onchange="changeDay()" style="font-weight:bold;"></select></div>
            <div><label>Body Weight (lbs)</label><input type="number" id="weightInput" value="208" onchange="recalculateMacroTargets()"></div>
            <div><label>Daily Calorie Goal</label><input type="number" id="calorieGoalInput" value="1500" onchange="recalculateMacroTargets()"></div>
            <div><label>Daily WW Points Goal</label><input type="number" id="wwGoalInput" value="32" onchange="updateWWGoal()" min="1"></div>
        </div>
    </div>

    <div class="card">
        <h2>Search & Log Food</h2>
        <div class="form-group">
            <label>Search USDA Database</label>
            <div class="search-row">
                <input type="text" id="searchInput" placeholder="e.g., Big Mac, Broccoli, Green Beans">
                <button onclick="searchUSDA()">Search</button>
                <button onclick="startBarcodeScan()" style="background:#10b981;">📷 Scan Barcode</button>
            </div>
        </div>
        <div class="form-group">
            <label>Search Results</label>
            <select id="foodSelect" onchange="updatePreview()"></select>
        </div>
        <div class="form-group">
            <label>Number of Servings (optional)</label>
            <input type="number" id="servingInput" value="1" min="0.1" step="0.1" onchange="updatePreview()">
        </div>
        <div class="form-group">
            <label>Consumed Amount (grams or ounces - overrides servings)</label>
            <div class="amount-row">
                <input type="number" id="amountInput" placeholder="e.g. 250 or 8" onchange="updatePreview()">
                <select id="unitSelect" onchange="updatePreview()">
                    <option value="g">grams (g)</option>
                    <option value="oz">ounces (oz)</option>
                </select>
            </div>
        </div>
        <div class="form-group preview-box" id="nutritionPreview">
            <em>Select a food to view nutritional information.</em>
        </div>
        <button onclick="logFood()" style="width:100%;">Log Food</button>

        <div style="margin-top:20px; padding:15px; background:linear-gradient(135deg,#f3e8ff,#e0e7ff); border-radius:10px;">
            <strong style="color:var(--purple);">Daily WW Points</strong>
            <div class="barometer-container" id="wwBarometer"></div>
            <div class="exercise-box">
                <label><strong>Exercise Points Earned</strong> (subtracts from total)</label>
                <input type="number" id="exerciseInput" value="0" min="0" step="0.5" onchange="updateExercisePoints()">
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Daily Targets</h2>
        <h3 style="font-size:1em;border-bottom:1px solid #eee;padding-bottom:5px;">Macros & Energy</h3>
        <div id="macroBarometersContainer"></div>
        <h3 style="font-size:1em;border-bottom:1px solid #eee;padding-bottom:5px;margin-top:20px;">Food Groups (Servings)</h3>
        <div id="groupBarometersContainer"></div>
    </div>

    <div class="card full-width">
        <h2>Daily Log</h2>
        <div id="logContainer"><p style="color:gray;">No foods logged yet today.</p></div>
        <button onclick="resetDay()" class="reset-btn">Reset Today's Data (Clear Log & Totals)</button>
    </div>
</div>

<!-- Barcode Scanner Modal -->
<div id="scannerModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:10000;align-items:center;justify-content:center;">
    <div style="background:white;padding:20px;border-radius:12px;width:90%;max-width:500px;">
        <h3>Scan Barcode</h3>
        <video id="video" autoplay playsinline style="width:100%;border-radius:8px;"></video>
        <p id="scanStatus" style="text-align:center;margin:15px 0;font-weight:bold;">Point camera at barcode...</p>
        <button onclick="stopBarcodeScan()" style="width:100%;background:#ef4444;padding:12px;">Cancel</button>
    </div>
</div>

<script>
    const API_KEY = 'fWgRdnx6ddvUpeb5yRLc2LvrIz0fYE2zvyJaKtu7';
    let currentSearchResults = [];
    let appData = { weight: 208, calorieGoal: 1500, wwGoal: 32, targets: {Calories:1500,Protein:50,Fat:22,Fiber:80,Fruit:2,Vegetable:5,Meat:1,Dairy:3,Grain:2}, history: {} };
    let state = { targets: appData.targets, current: null, log: null };

    function calculateWWPoints(cal, fat, fib) {
        const capped = Math.min(fib, 4);
        return Math.max(0, Math.round(((cal/50) + (fat/12) - (capped/4)) * 10) / 10);
    }

    function saveData() { localStorage.setItem('foodTrackerData', JSON.stringify(appData)); }
    function loadData() {
        const saved = localStorage.getItem('foodTrackerData');
        if (saved) Object.assign(appData, JSON.parse(saved));
        document.getElementById('weightInput').value = appData.weight || 208;
        document.getElementById('calorieGoalInput').value = appData.calorieGoal || 1500;
        document.getElementById('wwGoalInput').value = appData.wwGoal || 32;
    }

    function init() {
        loadData();
        const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const daySelect = document.getElementById('daySelect');
        daySelect.innerHTML = days.map(d => `<option value="${d}">${d}</option>`).join('');
        daySelect.value = days[new Date().getDay()];
        changeDay();
        document.getElementById('searchInput').addEventListener('keypress', e => e.key==='Enter' && searchUSDA());
    }

    // ... (Keep all your other functions: changeDay, updateWWGoal, recalculateMacroTargets, searchUSDA, getAllNutrients, guessCategory, getMultiplier, updatePreview, logFood, deleteItem, resetDay, renderBarometers, renderLog, etc.)

    // I'll assume you can copy them from your working version.

    // ==================== IMPROVED BARCODE SCANNER ====================
    let videoStream = null;

    async function startBarcodeScan() {
        const modal = document.getElementById('scannerModal');
        modal.style.display = 'flex';

        const status = document.getElementById('scanStatus');

        // Show manual entry immediately on iOS since BarcodeDetector is unreliable
        status.innerHTML = `
            <strong>Camera scanning is limited on iOS.</strong><br><br>
            Enter barcode number manually:<br><br>
            <input type="text" id="manualBarcode" placeholder="e.g. 012345678901" style="width:100%; padding:12px; font-size:1.1em;">
            <button onclick="manualBarcodeSubmit()" style="width:100%; margin-top:10px;">Submit Barcode</button>
        `;
    }

    function stopBarcodeScan() {
        const modal = document.getElementById('scannerModal');
        modal.style.display = 'none';
        if (videoStream) {
            videoStream.getTracks().forEach(track => track.stop());
            videoStream = null;
        }
    }

    function manualBarcodeSubmit() {
        const barcode = document.getElementById('manualBarcode').value.trim();
        if (!barcode) return alert("Please enter a barcode");
        stopBarcodeScan();
        fetchOpenFoodFacts(barcode);
    }

    async function fetchOpenFoodFacts(barcode) {
        const preview = document.getElementById('nutritionPreview');
        preview.innerHTML = `<em>Looking up barcode ${barcode}...</em>`;

        try {
            const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}.json`);
            const data = await res.json();

            if (data.status === 0 || !data.product) {
                preview.innerHTML = `<strong>Product not found in database.</strong><br>Barcode: ${barcode}`;
                return;
            }

            const p = data.product;
            const nut = p.nutriments || {};

            const fakeFood = {
                description: p.product_name || `Product ${barcode}`,
                brandOwner: p.brands || "Open Food Facts",
                foodNutrients: [
                    {nutrientId: 1008, value: parseFloat(nut['energy-kcal_100g'] || nut.energy_kcal || 0)},
                    {nutrientId: 1003, value: parseFloat(nut.proteins_100g || 0)},
                    {nutrientId: 1004, value: parseFloat(nut.fat_100g || 0)},
                    {nutrientId: 1079, value: parseFloat(nut.fiber_100g || 0)}
                ]
            };

            currentSearchResults = [fakeFood];
            const sel = document.getElementById('foodSelect');
            sel.innerHTML = `<option value="0" selected>${fakeFood.description}</option>`;

            updatePreview();

        } catch (e) {
            preview.innerHTML = `<strong>Failed to fetch product data.</strong><br>Barcode: ${barcode}`;
        }
    }

    // Paste the rest of your original functions here (init, changeDay, etc.)
    init();
</script>
</body>
</html>
