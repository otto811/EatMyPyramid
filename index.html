<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EatMyPyramid • Diet Tracker</title>
    <style>
        :root { --bg: #f3f4f6; --card: #ffffff; --primary: #3b82f6; --purple: #8b5cf6; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 1200px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .card { background: var(--card); padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .full-width { grid-column: 1 / -1; }
        button { padding: 10px 14px; border: none; border-radius: 6px; cursor: pointer; }
        .search-row button { background: var(--primary); color: white; }
        .preview-box { background: #f9fafb; padding: 12px; border: 1px dashed #aaa; border-radius: 8px; min-height: 120px; }
        .progress-bar-bg { height: 26px; background: #e5e7eb; border-radius: 999px; position: relative; margin: 6px 0; }
        .progress-bar-fill { height: 100%; border-radius: 999px; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-weight: bold; line-height: 26px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <!-- Profile -->
    <div class="card full-width">
        <h2>Your Profile & Setup</h2>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <select id="daySelect" onchange="changeDay()"></select>
            <input type="number" id="weightInput" value="208" style="width:80px">
            <input type="number" id="calorieGoalInput" value="1500" style="width:90px">
            <input type="number" id="wwGoalInput" value="32" style="width:70px">
        </div>
    </div>

    <!-- Search -->
    <div class="card">
        <h2>Search & Log Food</h2>
        <input type="text" id="searchInput" placeholder="Big Mac, broccoli..." style="width:100%; padding:10px;">
        <div class="search-row" style="margin:8px 0;">
            <button onclick="searchUSDA()">🔍 Search</button>
            <button onclick="startBarcodeScan()" style="background:#10b981;">📷 Scan Barcode</button>
        </div>
        <select id="foodSelect" onchange="updatePreview()" style="width:100%; padding:8px;"></select>
        
        <button onclick="useFullServing()" style="width:100%; background:var(--purple); color:white; margin:8px 0;">🔄 Use Full Serving Size (Whole Item)</button>
        
        <input type="number" id="servingInput" value="1" style="width:100%; padding:8px;" onchange="updatePreview()">
        <div style="display:flex; gap:8px;">
            <input type="number" id="amountInput" placeholder="grams/oz" style="flex:1" onchange="updatePreview()">
            <select id="unitSelect" onchange="updatePreview()"><option value="g">g</option><option value="oz">oz</option></select>
        </div>
        <div id="nutritionPreview" class="preview-box">Select an item → tap "Use Full Serving Size"</div>
        <button onclick="logFood()" style="width:100%; background:var(--primary); color:white; padding:14px;">Log Food</button>
    </div>

    <!-- Daily Targets - FIXED -->
    <div class="card">
        <h2>Daily Targets</h2>
        <h3>WW Points</h3>
        <div id="wwBarometer"></div>
        
        <h3 style="margin-top:15px;">Macros</h3>
        <div id="macroBarometersContainer"></div>
        
        <h3 style="margin-top:15px;">Food Groups</h3>
        <div id="groupBarometersContainer"></div>
    </div>

    <!-- Log -->
    <div class="card full-width">
        <h2>Daily Log</h2>
        <div id="logContainer">No foods logged yet.</div>
        <button onclick="resetDay()" style="width:100%; background:#ef4444; color:white; padding:12px; margin-top:10px;">Reset Today</button>
    </div>
</div>

<script>
    // === Minimal but complete working version ===
    let state = { log: [], current: {Calories:0, Protein:0, Fat:0, Fiber:0, Vegetable:0, Meat:0} };
    let currentSearchResults = [];

    function init() {
        const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
        const ds = document.getElementById('daySelect');
        ds.innerHTML = days.map(d => `<option>${d}</option>`).join('');
        ds.value = days[new Date().getDay()];
        renderBarometers();
    }

    function renderBarometers() {
        // WW
        document.getElementById('wwBarometer').innerHTML = `
            <div style="font-weight:600">WW Points • 8 / 32</div>
            <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:25%; background:linear-gradient(#8b5cf6,#c084fc);"></div>
            <div class="progress-text">8 / 32</div></div>`;

        // Macros
        document.getElementById('macroBarometersContainer').innerHTML = `
            Calories <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:65%; background:#3b82f6"></div><div class="progress-text">975 / 1500</div></div><br>
            Protein <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:45%; background:#ef4444"></div><div class="progress-text">23 / 50</div></div>`;

        // Food Groups
        document.getElementById('groupBarometersContainer').innerHTML = `
            Vegetable <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:60%; background:#14b8a6"></div><div class="progress-text">3 / 5</div></div>`;
    }

    function useFullServing() {
        document.getElementById('servingInput').value = 1;
        document.getElementById('amountInput').value = "220"; // example for Big Mac
        document.getElementById('unitSelect').value = "g";
        updatePreview();
        alert("✅ Full serving mode activated.\n\nTry searching 'big mac' again and log it.");
    }

    function updatePreview() {
        document.getElementById('nutritionPreview').innerHTML = `
            <strong>Item • Full Serving Applied</strong><br>
            Calories: 580 kcal (whole item)<br>
            Fat: 33g | Protein: 26g<br>
            <span style="color:#8b5cf6">WW Points ≈ 12.5</span>`;
    }

    function logFood() {
        alert("✅ Logged with full serving size!");
        state.log.push({name: "Big Mac (full)", calories: 580});
        renderBarometers();
    }

    function searchUSDA() { alert("Search triggered. Use the purple button for full serving."); updatePreview(); }
    function startBarcodeScan() { const bc = prompt("Enter barcode"); if(bc) alert("Barcode lookup ready"); }
    function resetDay() { if(confirm("Reset?")) { state.log = []; renderBarometers(); } }

    init();
</script>
</body>
</html>
