<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet & Macro Dashboard</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --primary: #3b82f6;
            --success-bg: #ecfdf5;
            --success-border: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --purple: #8b5cf6;
            --teal: #14b8a6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
        }
        .full-width { grid-column: 1 / -1; }
       
        .profile-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            background-color: #e0e7ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            align-items: center;
        }
        h2, h3 { margin-top: 0; color: var(--text-main); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.9em; font-weight: 600; margin-bottom: 5px; }
        input[type="text"], select, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1em;
        }
        .search-row { display: flex; gap: 10px; }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background-color: #2563eb; }
        .preview-box {
            background-color: #f9fafb;
            padding: 15px;
            border-radius: 6px;
            font-size: 0.9em;
            border: 1px dashed #d1d5db;
            min-height: 120px;
        }
        .barometer-container { margin-bottom: 15px; }
        .barometer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .progress-bar-bg {
            background-color: var(--border-color);
            border-radius: 10px;
            height: 22px;
            width: 100%;
            overflow: hidden;
            position: relative;
        }
        .progress-bar-fill {
            height: 100%;
            transition: width 0.4s ease;
        }
        .progress-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 0;
            font-size: 0.85em;
            line-height: 22px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
        }
        .log-item {
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .exercise-box {
            background-color: #fef3c7;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #f59e0b;
            margin: 10px 0;
        }
        .amount-row {
            display: flex;
            gap: 10px;
        }
        .amount-row input {
            flex: 2;
            padding: 14px;
            font-size: 1.1em;
        }
        .amount-row select {
            flex: 1;
            padding: 14px;
        }
        .reset-btn {
            background-color: #ef4444;
            color: white;
            width: 100%;
            margin-top: 15px;
            padding: 14px;
            font-size: 1.05em;
        }
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
